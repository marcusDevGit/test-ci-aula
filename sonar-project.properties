sonar.projectKey=marcusDevGit_test-ci-aula
sonar.organization=marcusdevgit
sonar.projectName=Test CI Aula
sonar.projectDescription=Projeto de teste para CI
sonar.projectVersion=1.0

# Configuração dos sources
sonar.sources=.
sonar.exclusions=**/*test.js,node_modules/**/*,coverage/**/*,.scannerwork/**/*

# Configuração dos testes
sonar.tests=.
sonar.test.inclusions=**/*test.js
sonar.coverage.exclusions=**/*test.js,jest.config.js
# Cobertura de testes
sonar.javascript.lcov.reportPaths=coverage/lcov.info